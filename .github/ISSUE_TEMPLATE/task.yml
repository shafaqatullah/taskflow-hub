name: Task
description: A discrete unit of work for contributors
title: "[Task]: "
labels: ["task", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for well-scoped engineering tasks (refactors, tests, docs).

  - type: textarea
    id: summary
    attributes:
      label: Task summary
      description: One sentence describing the outcome.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Files, modules, or layers affected.
      placeholder: lib/core/theme/, tests/unit/
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of done conditions.
      placeholder: |
        - [ ] Criteria 1
        - [ ] Criteria 2
    validations:
      required: true

  - type: dropdown
    id: estimate
    attributes:
      label: Estimate
      options:
        - Small (< 2 hours)
        - Medium (half day)
        - Large (1+ days)
    validations:
      required: true
