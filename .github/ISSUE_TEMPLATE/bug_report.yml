name: Bug Report
description: Report something that is broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I tap "New Task", the form does not open.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps help us reproduce the issue quickly.
      placeholder: |
        1. Open the app
        2. Tap "New Task"
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Flutter version, OS, device/emulator
      placeholder: Flutter 3.38.5, Windows 11, Chrome
    validations:
      required: true
