name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  dependency-graph: read

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4
